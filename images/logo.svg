    C 660,150 688,170 710,205
    C 728,236 736,278 736,328
    C 736,376 724,422 706,462
    C 690,498 668,530 644,555
    C 622,576 596,590 566,597
    C 546,601 524,598 502,586
    C 480,574 462,553 448,528
    C 436,507 430,484 430,462
