  <!-- Purple accent lines flanking DETAILERS -->
  <rect x="216" y="892" width="76" height="3.5" rx="1.5" fill="#7b35c4"/>
  <rect x="788" y="892" width="76" height="3.5" rx="1.5" fill="#7b35c4"/>

