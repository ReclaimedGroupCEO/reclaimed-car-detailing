  <ellipse cx="624" cy="310" rx="38" ry="28" fill="#ffffff" transform="rotate(-8,624,310)"/>
  <!-- Head -->
  <circle cx="608" cy="284" r="20" fill="#ffffff"/>
  <!-- Legs -->
  <rect x="604" y="336" width="8" height="26" rx="4" fill="#ffffff"/>
  <rect x="618" y="336" width="8" height="26" rx="4" fill="#ffffff"/>
  <rect x="634" y="336" width="8" height="24" rx="4" fill="#ffffff"/>
  <rect x="648" y="336" width="8" height="24" rx="4" fill="#ffffff"/>
  <!-- Tail stub -->
  <circle cx="662" cy="306" r="7" fill="#ffffff"/>

